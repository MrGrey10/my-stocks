name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /app/mystocks
            git pull origin main
            cd server

            # Збираємо та запускаємо все разом (це швидше та надійніше)
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

            # Чекаємо, поки NestJS ініціалізується (замість 'wait', який чекає зупинки)
            echo "Waiting for NestJS to start..."
            sleep 15

            # Виконуємо міграції
            docker exec nestjs npx prisma migrate deploy

            # (Опціонально) Якщо міграції не знайдено, можна додати db push:
            # docker exec nestjs npx prisma db push

            # Обов'язково чистимо старі образи, щоб диск знову не забився
            docker image prune -f

            echo "Server deployed successfully 🚀"
